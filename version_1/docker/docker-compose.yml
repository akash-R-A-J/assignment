version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - kafka
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'waiting for kafka to be ready...'
      cub kafka-ready -b kafka:9092 1 30
      kafka-topics --create --if-not-exists --topic orders --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1
      kafka-topics --create --if-not-exists --topic fills --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1
      kafka-topics --create --if-not-exists --topic book_updates --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1
      echo 'topics created'
      "
